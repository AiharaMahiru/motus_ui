      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.14 0 0 0 0 0.65 0 0 0 0 0.98 0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
